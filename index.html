<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GDRWeb | UI Stable v1.0.23</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
        }
        #gameCanvas { 
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.15); 
            border: 1px solid #1a1a1a; 
            background: #050508;
        }
        #loader-ui { 
            position: absolute; 
            text-align: center; 
            z-index: 10;
            display: none; 
        }
        .loading-text {
            font-size: 12px;
            letter-spacing: 2px;
            color: #0af;
        }
    </style>
</head>
<body>

    <div id="loader-ui">
        <div class="loading-text">LOADING LEVEL DATA...</div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    
    <script src="cocos2d.js"></script>
    
    <script src="script.js?v=1.0.23"></script>

</body>
</html>
