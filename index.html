<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GDRWeb | Gameplay v1.0.24</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            user-select: none; /* Prevents text highlighting while clicking to jump */
        }
        #gameCanvas { 
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.1); 
            border: 2px solid #111; 
            background: #000;
            cursor: pointer;
        }
        #loader-ui { 
            position: absolute; 
            text-align: center; 
            z-index: 10;
            pointer-events: none;
        }
        .loading-text {
            font-size: 14px;
            letter-spacing: 2px;
            color: #0f0;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="loader-ui">
        <div id="status" class="loading-text">BOOTING ENGINE...</div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="cocos2d.js"></script>
    
    <script src="script.js?v=1.0.24"></script>

</body>
</html>
