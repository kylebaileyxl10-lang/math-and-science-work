<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GDRWeb | Asset Recovery v1.0.30</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            /* Deep Space Purple/Blue Gradient for the GD vibe */
            background: radial-gradient(circle, #7d00ff 0%, #000000 100%); 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            /* Prevent accidental selection during fast clicking */
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        #gameCanvas { 
            box-shadow: 0 0 100px rgba(125, 0, 255, 0.3); 
            border: 2px solid #222; 
            background: #000;
            cursor: pointer;
            border-radius: 5px;
        }
        #loader-ui { 
            position: absolute; 
            text-align: center; 
            z-index: 100;
            pointer-events: none;
        }
        .loading-text {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="loader-ui">
        <div id="loading-msg" class="loading-text">LOADING ASSETS...</div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="cocos2d.js"></script>
    
    <script src="script.js?v=1.0.30"></script>

</body>
</html>
