<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Algebra 1 Practice</title>
  <style>
    body { background-color: #000000; color: #ffdd00; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    #loading { text-align: center; }
    .progress-bar-outer { border: 2px solid #ffdd00; height: 12px; width: 200px; margin-top: 10px; }
    .progress-bar-inner { height: 100%; width: 30%; background-color: #ffdd00; animation: load 2s infinite; }
    @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
  </style>
</head>
<body>
  <div id="loading">
    <p>Loading Math Lab Assets...</p>
    <div class="progress-bar-outer"><div class="progress-bar-inner"></div></div>
    <br>
    <button onclick="window.location.href='https://geometry-dash.io/'" style="background:#ffdd00; color:#000; border:none; padding:10px; cursor:pointer; font-weight:bold;">Launch Math Lab</button>
  </div>

  <script src="https://packager.turbowarp.org/scaffolding-60.2.1.js"></script>
  <script src="script.js"></script>
</body>
</html>
