<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GDRWeb Engine v1.0.17</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        #gameCanvas { border: 1px solid #333; background: #05050a; }
        #overlay { position: absolute; text-align: center; width: 100%; pointer-events: none; }
        .error-msg { color: #ff5555; font-weight: bold; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #ff5555; display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status">Loading Math Lab...</div>
        <div id="error-display" class="error-msg"></div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="cocos2d.js"></script>
    
    <script src="script.js?v=1.0.17"></script>

</body>
</html>
