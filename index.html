<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GDRWeb | Visual Overhaul v1.0.26</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            /* CRITICAL: Prevents accidental highlighting while clicking to jump */
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas { 
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.2); 
            border: 2px solid #111; 
            background: #000;
            cursor: pointer;
        }
        #loader-ui { 
            position: absolute; 
            text-align: center; 
            z-index: 10;
            pointer-events: none;
        }
        .loading-text {
            font-size: 14px;
            letter-spacing: 3px;
            color: #0af;
            text-shadow: 0 0 10px #0af;
        }
    </style>
</head>
<body>

    <div id="loader-ui">
        <div class="loading-text">SYNCING GEOMETRY...</div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="cocos2d.js"></script>
    
    <script src="script.js?v=1.0.26"></script>

</body>
</html>
