<!DOCTYPE html>
<html>
<head>

    <title>GDRWeb | v1.0.70</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        /* Core Engine Styles */
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Canvas with "Glow" effect to match the GD Vibe */
        #gameCanvas { 
            box-shadow: 0 0 100px rgba(190, 0, 190, 0.4); 
            border: 1px solid #444; 
            background: #000;
            cursor: pointer;
            border-radius: 4px;
        }

        #ui-overlay {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;

    <script src="script.js?v=1.0.70"></script>

    <script>
        // Simple console check to ensure the DOM is ready
        window.addEventListener('load', function() {
