<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Algebra 1 Practice</title>
  <style>
    body { background: #000; color: #ffdd00; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    #app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #loader-ui { position: relative; z-index: 2; text-align: center; }
    .bar-out { border: 1px solid #ffdd00; height: 10px; width: 200px; margin: 10px auto; }
    .bar-in { height: 100%; width: 0%; background: #ffdd00; transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loader-ui">
    <div id="status">Connecting to Math Lab...</div>
    <div class="bar-out"><div id="bar" class="bar-in"></div></div>
  </div>

  <script src="https://packager.turbowarp.org/scaffolding-60.2.1.js"></script>
  <script src="script.js"></script>
</body>
</html>
