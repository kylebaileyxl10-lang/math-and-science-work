<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GDRWeb | Full Game System v1.0.27</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            /* Prevents blue highlight boxes on mobile/touch */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
        }
        #gameCanvas { 
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.2); 
            border: 2px solid #111; 
            background: #000;
            cursor: pointer;
        }
        #loader-ui { 
            position: absolute; 
            text-align: center; 
            z-index: 20;
            pointer-events: none;
        }
        .loading-text {
            font-size: 14px;
            letter-spacing: 2px;
            color: #0cf;
            text-shadow: 0 0 15px #0cf;
        }
    </style>
</head>
<body>

    <div id="loader-ui">
        <div class="loading-text">INITIALIZING GLOBAL SYSTEM...</div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="cocos2d.js"></script>
    
    <script src="script.js?v=1.0.27"></script>

</body>
</html>
