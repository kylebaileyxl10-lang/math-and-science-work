<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Algebra 1 Practice</title>
    <style>
        /* Ensures the game fills the iPad screen perfectly */
        body { 
            background: #000; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: #fff;
            font-family: sans-serif;
        }
        canvas { width: 100%; height: 100%; }
        #loading, #status { position: absolute; width: 100%; text-align: center; z-index: 10; }
        #status { margin-top: 40px; color: #aaa; font-size: 0.8em; }
        #Cocos2dGameContainer { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="loading">Initializing Math Analysis...</div>
    <div id="status">Checking Asset Integrity...</div>

    <div id="Cocos2dGameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/RealIndie/GD-Web@main/cocos2d-js-v3.13.js"></script>
    <script src="script.js"></script>
</body>
</html>
